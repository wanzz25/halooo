<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — MC AutoBackup</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  body{display:flex;min-height:100vh;}
  .sidebar{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
  .sb-brand{padding:20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .sb-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 0 16px rgba(0,229,160,.3);}
  .sb-title{font-family:var(--display);font-size:14px;font-weight:800;line-height:1.1;}
  .sb-title span{color:var(--accent);}
  .sb-ver{font-size:9px;color:var(--muted);letter-spacing:1px;}
  .nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;}
  .nav-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;padding:8px 8px 4px;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:12px;color:var(--muted2);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;}
  .nav-link:hover{background:var(--border);color:var(--text);}
  .nav-link.active{background:var(--accent-dim);color:var(--accent);font-weight:600;}
  .nav-link .ic{font-size:14px;width:20px;text-align:center;}
  .sb-user{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .u-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
  .u-info{flex:1;min-width:0;}
  .u-name{font-size:12px;font-weight:600;}
  .u-role{font-size:10px;color:var(--muted2);}
  .btn-out{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;font-size:14px;transition:color .2s;}
  .btn-out:hover{color:var(--danger);}

  .main{margin-left:228px;flex:1;display:flex;flex-direction:column;}
  .topbar{padding:14px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,11,16,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;}
  .pg-title{font-family:var(--display);font-size:18px;font-weight:700;}
  .content{padding:26px;flex:1;}

  /* File path badge */
  .path-badge{display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.1);border-radius:var(--radius-sm);font-size:11px;color:var(--muted2);margin-bottom:18px;}
  .path-badge code{color:var(--accent);font-size:10px;}

  /* User cards */
  .u-grid{display:flex;flex-direction:column;gap:12px;}
  .u-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;animation:fadeUp .25s ease;flex-wrap:wrap;}
  .ua{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
  .ui{flex:1;min-width:0;}
  .un{font-size:15px;font-weight:700;}
  .um{font-size:11px;color:var(--muted2);margin-top:3px;}
  .u-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}

  /* Modal */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-ov.open{display:flex;animation:fadeUp .25s ease;}
  .modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;width:100%;max-width:440px;position:relative;}
  .modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
  .modal h3{font-family:var(--display);font-size:17px;margin-bottom:6px;}
  .modal p{font-size:12px;color:var(--muted2);margin-bottom:22px;}
  .modal-fields{display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}

  .empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;}
</style>
</head>
<body class="grid-bg">

<aside class="sidebar">
  <div class="sb-brand">
    <div class="sb-icon">⛏️</div>
    <div>
      <div class="sb-title">MC<span>Backup</span></div>
      <div class="sb-ver">ADMIN PANEL</div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-label">Menu</div>
    <button class="nav-link" onclick="window.location.href='dashboard.html'"><span class="ic">💾</span> Dashboard</button>
    <div class="nav-label">Admin</div>
    <button class="nav-link active"><span class="ic">👥</span> Kelola User</button>
  </nav>
  <div class="sb-user">
    <div class="u-av" id="u-av"></div>
    <div class="u-info"><div class="u-name" id="u-name">—</div><div class="u-role">🔑 Admin</div></div>
    <button class="btn-out" onclick="logout()">⏻</button>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="pg-title">👥 Kelola User</div>
    <button class="btn btn-primary" onclick="openModal()">+ Tambah User</button>
  </header>

  <div class="content">
    <div class="path-badge">
      📁 Data user tersimpan di <code>data/users.json</code> &nbsp;·&nbsp; Config per-user di <code>data/configs.json</code>
    </div>
    <div class="u-grid" id="u-grid"><div class="empty">Loading...</div></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-ov" id="modal">
  <div class="modal">
    <h3 id="m-title">Tambah User Baru</h3>
    <p id="m-desc">Akun baru akan tersimpan di data/users.json.</p>
    <div class="modal-fields">
      <div class="field"><label>Display Name</label><input type="text" id="m-display" placeholder="Nama tampilan"/></div>
      <div class="field"><label>Username</label><input type="text" id="m-username" placeholder="huruf kecil, tanpa spasi"/></div>
      <div class="field"><label id="m-pw-label">Password</label><input type="password" id="m-password" placeholder="Min 6 karakter"/></div>
      <div class="field"><label>Role</label>
        <select id="m-role">
          <option value="user">👤 User</option>
          <option value="admin">🔑 Admin</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="m-btn" onclick="submitModal()">Buat User</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="../assets/app.js"></script>
<script>
let ME = Session.requireAdmin('dashboard.html');
if (!ME) throw new Error('Not admin');

const av = document.getElementById('u-av');
av.textContent = (ME.displayName||ME.username)[0].toUpperCase();
av.style.background = avatarColor(av.textContent);
document.getElementById('u-name').textContent = ME.displayName||ME.username;

async function logout() { try{await API.post('/api/auth/logout');}catch{} Session.clear(); window.location.href='../index.html'; }

// ─── Render ──────────────────────────────────
async function loadUsers() {
  const el = document.getElementById('u-grid');
  try {
    const { users } = await API.get('/api/users');
    if (!users.length) { el.innerHTML = '<div class="empty">Belum ada user.</div>'; return; }
    el.innerHTML = users.map(u => {
      const letter = (u.displayName||u.username)[0].toUpperCase();
      const color = avatarColor(letter);
      const isMe = u.id === ME.id;
      return `
        <div class="u-card">
          <div class="ua" style="background:${color};color:#000">${letter}</div>
          <div class="ui">
            <div class="un">${u.displayName||u.username} ${isMe?'<span class="badge badge-blue" style="font-size:9px">KAMU</span>':''}</div>
            <div class="um">
              @${u.username} ·
              <span class="badge ${u.role==='admin'?'badge-green':'badge-blue'}">${u.role==='admin'?'🔑 Admin':'👤 User'}</span> ·
              Login terakhir: ${fmtDate(u.lastLogin)}
            </div>
          </div>
          <div class="u-actions">
            <button class="btn btn-ghost btn-sm" onclick="editUser(${u.id})">✏ Edit</button>
            ${!isMe?`<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id},'${u.username}')">✕ Hapus</button>`:''}
          </div>
        </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div class="empty">Gagal load: ${e.message}</div>`; }
}

// ─── Modal ────────────────────────────────────
let editingId = null;

function openModal(id=null) {
  editingId = id;
  document.getElementById('m-title').textContent = id ? 'Edit User' : 'Tambah User Baru';
  document.getElementById('m-desc').textContent = id ? 'Perubahan tersimpan ke data/users.json.' : 'User baru tersimpan ke data/users.json.';
  document.getElementById('m-btn').textContent = id ? 'Simpan Perubahan' : 'Buat User';
  document.getElementById('m-pw-label').textContent = id ? 'Password Baru (kosongkan jika tidak ganti)' : 'Password';
  document.getElementById('m-password').placeholder = id ? 'Kosongkan jika tidak ganti' : 'Min 6 karakter';
  if (!id) {
    document.getElementById('m-display').value = '';
    document.getElementById('m-username').value = '';
    document.getElementById('m-password').value = '';
    document.getElementById('m-role').value = 'user';
    document.getElementById('m-username').disabled = false;
  }
  document.getElementById('modal').classList.add('open');
}

async function editUser(id) {
  try {
    const { users } = await API.get('/api/users');
    const u = users.find(x=>x.id===id);
    if (!u) return;
    openModal(id);
    document.getElementById('m-display').value = u.displayName||'';
    document.getElementById('m-username').value = u.username;
    document.getElementById('m-username').disabled = true;
    document.getElementById('m-password').value = '';
    document.getElementById('m-role').value = u.role;
  } catch(e) { Toast.err(e.message); }
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editingId=null; }

async function submitModal() {
  const display  = document.getElementById('m-display').value.trim();
  const username = document.getElementById('m-username').value.trim().toLowerCase();
  const password = document.getElementById('m-password').value;
  const role     = document.getElementById('m-role').value;

  if (!display) { Toast.err('Display name wajib!'); return; }
  if (!editingId && !username) { Toast.err('Username wajib!'); return; }
  if (!editingId && !/^[a-z0-9_]+$/.test(username)) { Toast.err('Username: huruf kecil, angka, underscore saja!'); return; }

  const btn = document.getElementById('m-btn');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  try {
    if (editingId) {
      const body = { displayName: display, role };
      if (password) {
        if (password.length < 6) { Toast.err('Password minimal 6 karakter!'); return; }
        body.password = password;
      }
      await API.put(`/api/users/${editingId}`, body);
      Toast.ok('User diperbarui & tersimpan ke file!');
    } else {
      if (!password || password.length < 6) { Toast.err('Password minimal 6 karakter!'); return; }
      await API.post('/api/users', { username, password, displayName: display, role });
      Toast.ok(`User @${username} dibuat & tersimpan ke file!`);
    }
    closeModal();
    loadUsers();
  } catch(e) { Toast.err(e.message); }
  btn.disabled = false; btn.textContent = editingId ? 'Simpan Perubahan' : 'Buat User';
}

async function deleteUser(id, username) {
  if (!confirm(`Hapus user @${username}? Data konfigurasi panel-nya juga akan dihapus.`)) return;
  try {
    await API.del(`/api/users/${id}`);
    Toast.warn(`User @${username} dihapus dari file`);
    loadUsers();
  } catch(e) { Toast.err(e.message); }
}

document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });

loadUsers();
</script>
</body>
</html>
